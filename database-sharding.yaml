  dn2_write:
    url: jdbc:mysql://10.0.0.10:3306/sqldb1?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: wzc
    password: wzc123

  dn2_read1:
    url: jdbc:mysql://10.0.0.52:3306/sqldb1?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
